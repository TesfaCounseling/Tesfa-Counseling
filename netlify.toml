[build]
  base = "frontend"
  command = "npm run build"
  # Must differ from base; @netlify/plugin-nextjs uses this. Clear "Publish directory" in Netlify UI if set to "frontend".
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
